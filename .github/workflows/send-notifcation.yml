name: Test
run-name: send-discord-notification
on:
  branch_protection_rule:
    types: [created]
jobs:
  send-notification:
      runs-on: ubuntu-latest
      steps:
        - name: discord-notification
          uses: tenzin1308/discord-notification@v1.0.0
          with:
            discord-webhook-url: ${{ secrets.WEBHOOK_URL }}
